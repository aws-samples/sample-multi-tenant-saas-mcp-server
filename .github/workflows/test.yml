name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp-server-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp_server/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp_server/src/package-lock.json
      - run: npm ci
      - run: npm test
